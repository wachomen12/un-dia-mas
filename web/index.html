<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Un Día Más — mensajes motivadores diarios. Una app cálida para acompañarte un día a la vez.">
  <meta name="keywords" content="motivación, frases motivadoras, racha, diario, bienestar, salud mental, app, daily quotes">
  <meta name="theme-color" content="#E89B6A">

  <!-- iOS PWA tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Un Día Más">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Open Graph (vista previa al compartir el link) -->
  <meta property="og:title" content="Un Día Más">
  <meta property="og:description" content="Mensajes motivadores diarios. Una app cálida para acompañarte un día a la vez.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Un Día Más">
  <meta name="twitter:description" content="Mensajes motivadores diarios.">
  <meta name="twitter:image" content="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Un Día Más 🌅</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      background: linear-gradient(135deg, #FFDABE 0%, #E89B6A 55%, #D27D55 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 100;
      transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
    }

    #splash.hide {
      opacity: 0;
      visibility: hidden;
    }

    #splash .emoji {
      font-size: 64px;
      animation: pulse 1.8s ease-in-out infinite;
    }

    #splash .title {
      font-size: 28px;
      font-weight: 700;
      font-style: italic;
      color: #fff;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    #splash .subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 0.4px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="emoji">🌅</div>
    <div class="title">Un Día Más</div>
    <div class="subtitle">un día a la vez</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hide');
        setTimeout(function () {
          if (splash.parentNode) splash.parentNode.removeChild(splash);
        }, 700);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
